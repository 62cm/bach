      if (stepIndex < N_STEPS && beat < rollIn) {
        const u = Math.min(1, Math.max(0, beat / rollIn));
        const x0 = -BALL_R - 40;
        x = x0 + (BX - x0) * u;
      }
      return { x, y: ground, bar: plan, impact: false };
    }

    // 周期开头空拍：上一台阶滚落
    if (beat < REST) {
      const u = beat / REST;
      if (u < ROLL_FRAC) {
        return { x: BX, y: groundPrev, bar: plan, impact: false };
      }
      const f = (u - ROLL_FRAC) / (1 - ROLL_FRAC);
      const y = groundPrev + (ground - groundPrev) * (f * f);
      return {
        x: BX,
        y,
        bar: plan,
        impact: f > 0.9 && landingFlash(REST, kind),
      };
    }

    if (kind === "flat") {
      return { x: BX, y: ground, bar: plan, impact: false };
    }

    if (beat < 1.0) {
      const b = bounceSegment(beat, BIG, 1.0, "big");
      return {
        x: BX,
        y: ground - b.yOff,
        bar: plan,
        impact: landingFlash(beat, kind),
      };
    }

    if (beat < dur) {
      const b = bounceSegment(beat, SMALL, dur, "small");
      return {
        x: BX,
        y: ground - b.yOff,
        bar: plan,
        impact: landingFlash(beat, kind),
      };
    }

    return ballState(tMus + 1e-4);
  }

  function colorsForBar(plan) {
    return plan % 2 === 1 ? { bg: LIGHT, fg: DARK } : { bg: DARK, fg: LIGHT };
  }

  function draw(tMus) {
    const scrollX = scrollXAt(tMus);
    const ball = ballState(tMus);
    const { bg, fg } = colorsForBar(ball.bar);
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const mid = locate(tMus).stepIndex;
    const onBar22 = isBar22(planOf(mid));
    ctx.lineWidth = 2.5;

    for (let i = mid - 3; i <= mid + 3; i++) {
      const plan = planOf(i);
      // 站在22上时：左侧不画21，只留无限平线
      if (onBar22 && i < mid) continue;

      const s = stepScreen(i, scrollX);
      if (isBar22(plan)) {
        // 22：左边无限出画，右边竖线接到第1台阶
        const xR = s.x + s.w;
        if (xR < -40 || s.x > W + 200) continue;
        ctx.strokeStyle = fg;
        ctx.beginPath();
        ctx.moveTo(-40, s.y);
        ctx.lineTo(xR, s.y);
        ctx.stroke();
        // 22→1 的落差竖线（之前丢掉的那条）
        ctx.beginPath();
        ctx.moveTo(xR, s.y);
        ctx.lineTo(xR, s.y + STEP_H + 40);
        ctx.stroke();
        continue;
      }

      if (s.x > W + 40 || s.x + s.w < -40) continue;
      const barNum =
        STEPS[plan].bar ||
        Math.floor((STEPS[plan].slot != null ? STEPS[plan].slot : plan) / 2) + 1;

      ctx.strokeStyle = fg;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x + s.w, s.y);
      if (stepKind(plan) === "cycle") {
        ctx.lineTo(s.x + s.w, s.y + STEP_H + 40);
      }
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x, s.y + (stepKind(plan) === "cycle" ? STEP_H + 40 : 20));
      ctx.stroke();

      ctx.fillStyle = fg;
      ctx.font = "600 18px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(String(barNum), s.x + s.w * 0.5, s.y + 22);
    }

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    if (ball.impact) {
      ctx.fillStyle = fg;
      ctx.fill();
    }
    ctx.strokeStyle = fg;
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  function frame() {
    const t = musicalTime();
    if (playing) scheduleAhead();
    if (started && !playing && audioCtx && audioCtx.state === "running") beginPlayback();
    draw(t);
    requestAnimationFrame(frame);
  }

  // 手机/浏览器：必须用户点按才能出声；点一下同时开动画
  const unlock = (e) => {
    if (e) e.preventDefault();
    startExperience();
  };
  gate.addEventListener("pointerdown", unlock);
  canvas.addEventListener("pointerdown", unlock);
  window.addEventListener("keydown", unlock);
  requestAnimationFrame(frame);
})();

  </script>
</body>
</html>
